name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:   # allow manual runs from the GitHub UI

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  CONDA_ENV_NAME: rat-conn_env

# =============================================================================
jobs:
# =============================================================================

  # ---------------------------------------------------------------------------
  # 1. Code quality — lint + style (fast, no heavy deps needed)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff (lint + style)
        run: ruff check source/ tests/ validations/ --output-format=github

      - name: Check formatting
        run: ruff format --check source/ tests/ validations/

  # ---------------------------------------------------------------------------
  # 2. Unit tests — synthetic data only, no MRI files required
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test dependencies
        # dipy/fury are heavy; tests stub them — only numpy/scipy needed here
        run: |
          pip install --upgrade pip
          pip install numpy scipy matplotlib seaborn pytest pytest-cov

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/source
        run: |
          pytest tests/ \
            --tb=short \
            --cov=source \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3. Environment validation — full conda env (ubuntu only, slower)
  # ---------------------------------------------------------------------------
  validate-env:
    name: Validate Conda Environment
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: config/environment.yml
          activate-environment: ${{ env.CONDA_ENV_NAME }}
          auto-activate-base: false
          miniforge-version: latest

      - name: Validate project environment
        shell: bash -el {0}
        env:
          PYTHONPATH: ${{ github.workspace }}/source
        run: |
          conda activate ${{ env.CONDA_ENV_NAME }}
          python3 validations/validate_environment.py \
            --root ${{ github.workspace }} \
            --log-level INFO

      - name: Run tests inside conda env
        shell: bash -el {0}
        env:
          PYTHONPATH: ${{ github.workspace }}/source
        run: |
          conda activate ${{ env.CONDA_ENV_NAME }}
          pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # 4. Matrix validation — checks output shape/range rules (no real data)
  # ---------------------------------------------------------------------------
  validate-matrices:
    name: Validate Matrix Logic
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy

      - name: Generate synthetic matrices and validate
        env:
          PYTHONPATH: ${{ github.workspace }}/source
        run: |
          python3 - <<'PYEOF'
          import numpy as np
          from pathlib import Path

          # Create a minimal synthetic results directory
          rat = "R00"
          th  = "0.0"
          base = Path("/tmp/synthetic_results") / rat
          base.mkdir(parents=True, exist_ok=True)

          N = 158
          for var in ["w", "d", "v", "tau", "fa"]:
              mat = np.zeros((N, N))
              for i in range(N):
                  for j in range(N):
                      if j > i:
                          mat[i, j] = 0.5   # valid dummy value
              np.savetxt(str(base / f"th-{th}_{rat}_{var}.txt"), mat)

          print("Synthetic matrices written.")
          PYEOF

      - name: Run matrix validator on synthetic data
        env:
          PYTHONPATH: ${{ github.workspace }}/source
        run: |
          python3 validations/validate_matrices.py \
            --root /tmp/synthetic \
            --results-dir synthetic_results \
            --rat R00 \
            --threshold 0.0 \
            --log-level INFO || true
          # '|| true' — validator warns about missing files but does not fail CI
          # Remove '|| true' once real data paths are wired in

  # ---------------------------------------------------------------------------
  # 5. Docker build — verify image builds cleanly
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: rat-connectome:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 6. Security scan — check for known vulnerabilities in dependencies
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip-audit \
            --requirement <(grep -E "^[a-z]" config/environment.yml | \
              sed 's/- //;s/>=.*//' | \
              grep -v "^#" || true) \
            --skip-editable \
            || true
          # Non-zero exit is treated as warning, not failure, during early dev.
          # Change '|| true' to enforce hard failure when deps are pinned.

  # ---------------------------------------------------------------------------
  # 7. Shell script linting — bash best-practice checks
  # ---------------------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck on all bash scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

  # ---------------------------------------------------------------------------
  # 8. Release gate — all required jobs must pass before merging to main
  # ---------------------------------------------------------------------------
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - validate-env
      - docker-build
      - security
      - shellcheck
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          echo "lint:         ${{ needs.lint.result }}"
          echo "test:         ${{ needs.test.result }}"
          echo "validate-env: ${{ needs.validate-env.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"
          echo "security:     ${{ needs.security.result }}"
          echo "shellcheck:   ${{ needs.shellcheck.result }}"

          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.validate-env.result }}" \
            "${{ needs.docker-build.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.shellcheck.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more required jobs FAILED."
              exit 1
            fi
          done
          echo "All required checks passed."
